{{define "TaskList" }}

    <div class="w-full h-full flex flex-col justify-center items-center">
        <ul class="flex flex-col">
           {{range .Tasks}}
                <div class="">
                    <input
                        type="checkbox"
                        name="status"
                        class="mr-4"
                    /> 

                    <li>
                        {{ .Task }}
                    </li>
                </div>
           {{end}}
        </ul>
    </div>
{{end}}
