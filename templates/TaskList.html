{{define "TaskList" }}

    <div class="w-[25rem] px-4 border-2 border-solid border-black">
        <ul class="bg-white rounded-md shadow-md divide-y divide-gray-200">
            {{range .Tasks}}
                <li class="flex items-center px-6 py-4">
                    <input
                        type="checkbox"
                        name="status"
                        class="h-5 w-5 text-blue-600 rounded-full mr-4"
                    />
                    <span class="text-gray-700">{{ .Text }}</span>
                </li>
            {{end}}
        </ul>
    </div>

{{end}}
